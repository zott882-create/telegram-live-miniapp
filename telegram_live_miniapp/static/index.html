<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Live · IGScore</title>
<link rel="stylesheet" href="/styles.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app-shell" id="app"></div>

<script>
"use strict";

// ============================================================
//  Telegram WebApp init
// ============================================================
const tg = window.Telegram?.WebApp;
if (tg) {
  try {
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#0a1410");
    tg.setBackgroundColor("#050a07");
  } catch (_) {}
}

// ============================================================
//  Local storage helpers (favorites + notify config)
// ============================================================
const FAV_KEY = "miniapp-v5-favorites";
const NOTIFY_FILTER_KEY = "miniapp-v5-notify-filter";
const NOTIFY_ENABLED_KEY = "miniapp-v5-notify-enabled";
const NOTIFY_SEEN_KEY = "miniapp-v5-notify-seen";

function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveFavs(s) { localStorage.setItem(FAV_KEY, JSON.stringify([...s])); }
function isFav(id) { return getFavs().has(String(id)); }
function toggleFav(id) {
  const f = getFavs();
  const k = String(id);
  if (f.has(k)) f.delete(k); else f.add(k);
  saveFavs(f);
  return f.has(k);
}

function getNotifyFilter() {
  try { return JSON.parse(localStorage.getItem(NOTIFY_FILTER_KEY) || "null") || defaultNotifyFilter(); }
  catch { return defaultNotifyFilter(); }
}
function saveNotifyFilter(f) { localStorage.setItem(NOTIFY_FILTER_KEY, JSON.stringify(f)); }
function defaultNotifyFilter() {
  return {
    enabled: false,
    minute_min: 45, minute_max: 65,
    shots_min: 14, on_target_min: 6,
    dangerous_min: 51, attacks_min: 101,
    corners_min: 0,
    possession_min: 0,
    scores: ["0-0", "1-0", "0-1"],
    countries: [],
  };
}
function getNotifyEnabled() { return localStorage.getItem(NOTIFY_ENABLED_KEY) === "1"; }
function setNotifyEnabled(v) { localStorage.setItem(NOTIFY_ENABLED_KEY, v ? "1" : "0"); }

function getSeenAlerts() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIFY_SEEN_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveSeenAlerts(s) {
  const arr = [...s];
  if (arr.length > 200) arr.splice(0, arr.length - 200);
  localStorage.setItem(NOTIFY_SEEN_KEY, JSON.stringify(arr));
}

// ============================================================
//  State
// ============================================================
const state = {
  view: "matches",          // matches | favorites | notify | detail
  live: null,
  loading: true,
  selectedMatch: null,
  detail: null,
  detailTab: "live",        // live | stats | avg
  preset: "all",            // all | 1t | 2t | 00 | fav
  filters: {                // main feed filters
    minute_min: 1, minute_max: 130,
    shots_min: 0, on_target_min: 0,
    dangerous_min: 0, attacks_min: 0,
    corners_min: 0, possession_min: 0,
    scores: "",
  },
  sheet: null,              // "filters" | "notify-edit" | null
  inAppAlerts: [],          // [{matchId, ts, title}]
  unreadAlerts: 0,
};

const app = document.getElementById("app");

// ============================================================
//  Utilities
// ============================================================
function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

function safeInt(v, def = 0) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? n : def;
}

function flagSvg(code) {
  if (!code) return "🌍";
  const cc = String(code).toUpperCase();
  return `<img src="https://flagcdn.com/${cc.toLowerCase()}.svg" alt="${esc(cc)}" onerror="this.outerHTML='🌍'" />`;
}

function initials(name) {
  const s = String(name || "").trim();
  if (!s) return "FC";
  const parts = s.replace(/[^\p{L}\p{N} ]/gu, " ").split(/\s+/).filter(Boolean);
  if (parts.length === 1) return parts[0].slice(0, 3).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function flattenLive(live) {
  const out = [];
  for (const c of live?.countries || [])
    for (const l of c.leagues || [])
      for (const m of l.matches || []) out.push(m);
  return out;
}

// Sort countries to match igscore.net order: TOP leagues first, then alphabetical
const TOP_COUNTRIES_RU = ["Англия", "Испания", "Италия", "Германия", "Франция", "Нидерланды", "Португалия"];
const TOP_LEAGUES = ["Премьер-лига", "Ла Лига", "Серия A", "Бундеслига", "Лига 1", "Эредивизи"];
function topRank(name, list) {
  const i = list.indexOf(name);
  return i === -1 ? 999 : i;
}

function groupByLeague(matches) {
  // Returns array of { country, country_code, league, matches[] }
  const map = new Map();
  for (const m of matches) {
    const c = m.country || "Без страны";
    const l = m.league || "Без лиги";
    const key = c + "|||" + l;
    if (!map.has(key)) {
      map.set(key, { country: c, country_code: m.country_code || "", league: l, matches: [] });
    }
    map.get(key).matches.push(m);
  }
  return [...map.values()].sort((a, b) => {
    const cRankA = topRank(a.country, TOP_COUNTRIES_RU);
    const cRankB = topRank(b.country, TOP_COUNTRIES_RU);
    if (cRankA !== cRankB) return cRankA - cRankB;
    const lRankA = topRank(a.league, TOP_LEAGUES);
    const lRankB = topRank(b.league, TOP_LEAGUES);
    if (lRankA !== lRankB) return lRankA - lRankB;
    const cn = a.country.localeCompare(b.country, "ru");
    if (cn !== 0) return cn;
    return a.league.localeCompare(b.league, "ru");
  });
}

function matchPassesFilter(m, f) {
  const minute = safeInt(m.minute, 0);
  if (minute < f.minute_min || minute > f.minute_max) return false;
  if (f.scores && String(f.scores).trim()) {
    const allowed = String(f.scores).split(",").map(s => s.trim()).filter(Boolean);
    if (allowed.length && !allowed.includes(m.score)) return false;
  }
  const s = m.stats || {};
  if (f.shots_min && (safeInt(s.shots_total, (safeInt(s.shots_home) + safeInt(s.shots_away))) < f.shots_min)) return false;
  if (f.on_target_min && (safeInt(s.on_target_total, (safeInt(s.on_target_home) + safeInt(s.on_target_away))) < f.on_target_min)) return false;
  if (f.dangerous_min && (safeInt(s.dangerous_total, (safeInt(s.dangerous_home) + safeInt(s.dangerous_away))) < f.dangerous_min)) return false;
  if (f.attacks_min && (safeInt(s.attacks_total, (safeInt(s.attacks_home) + safeInt(s.attacks_away))) < f.attacks_min)) return false;
  if (f.corners_min && (safeInt(s.corners_total, (safeInt(s.corners_home) + safeInt(s.corners_away))) < f.corners_min)) return false;
  if (f.possession_min) {
    const maxPoss = Math.max(safeInt(s.possession_home, 50), safeInt(s.possession_away, 50));
    if (maxPoss < f.possession_min) return false;
  }
  return true;
}

function filteredMatches() {
  const all = flattenLive(state.live);
  let arr = all.filter(m => matchPassesFilter(m, state.filters));
  if (state.preset === "1t") arr = arr.filter(m => safeInt(m.minute, 0) <= 45);
  else if (state.preset === "2t") arr = arr.filter(m => safeInt(m.minute, 0) > 45);
  else if (state.preset === "00") arr = arr.filter(m => safeInt(m.score_home) === 0 && safeInt(m.score_away) === 0);
  else if (state.preset === "fav") {
    const fav = getFavs();
    arr = arr.filter(m => fav.has(String(m.id)));
  }
  return arr;
}

// ============================================================
//  API
// ============================================================
async function loadLive(force = false) {
  try {
    const res = await fetch(`/api/live${force ? "?force=1" : ""}`, { cache: "no-store" });
    state.live = await res.json();
  } catch (err) {
    state.live = { ok: false, total: 0, countries: [], error: String(err) };
  } finally {
    state.loading = false;
    checkNotifyMatches();
    render();
  }
}

async function loadDetail(id) {
  state.selectedMatch = id;
  state.view = "detail";
  state.detail = null;
  state.detailTab = "live";
  render();
  try {
    const res = await fetch(`/api/match?id=${encodeURIComponent(id)}`, { cache: "no-store" });
    state.detail = await res.json();
  } catch (err) {
    state.detail = { ok: false, error: String(err) };
  }
  render();
}

// ============================================================
//  Notify check: if a match matches the filter and was not seen yet,
//  push an in-app alert + (if Telegram tg.HapticFeedback available) buzz
// ============================================================
function checkNotifyMatches() {
  const cfg = getNotifyFilter();
  if (!cfg.enabled) return;
  const seen = getSeenAlerts();
  const newAlerts = [];
  for (const m of flattenLive(state.live)) {
    if (!matchPassesFilter(m, cfg)) continue;
    if (cfg.scores && cfg.scores.length && !cfg.scores.includes(m.score)) continue;
    if (cfg.countries && cfg.countries.length && !cfg.countries.includes(m.country)) continue;
    const id = String(m.id);
    if (seen.has(id)) continue;
    seen.add(id);
    newAlerts.push({
      id,
      ts: Date.now(),
      title: `${m.home} ${m.score_home}-${m.score_away} ${m.away}`,
      subtitle: `${m.minute_text || ""} · ${m.country} · ${m.league}`,
    });
  }
  if (newAlerts.length) {
    saveSeenAlerts(seen);
    state.inAppAlerts = [...newAlerts, ...state.inAppAlerts].slice(0, 50);
    state.unreadAlerts = Math.min(99, state.unreadAlerts + newAlerts.length);
    try { tg?.HapticFeedback?.notificationOccurred?.("warning"); } catch (_) {}
    // Server-side delivery (Telegram push) — fire and forget
    for (const a of newAlerts) {
      fetch("/api/notify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          init_data: tg?.initData || "",
          match_id: a.id,
          text: `🔔 ${a.title}\n${a.subtitle}`,
        }),
      }).catch(() => {});
    }
  }
}

// ============================================================
//  RENDERING
// ============================================================
function render() {
  if (state.view === "detail") return renderDetail();
  if (state.view === "favorites") return renderFavorites();
  if (state.view === "notify") return renderNotify();
  return renderMatches();
}

// ----------------------------------------
//  Matches feed (main screen)
// ----------------------------------------
function renderMatches() {
  const total = state.live ? safeInt(state.live.total, flattenLive(state.live).length) : 0;
  const visible = filteredMatches();
  const groups = groupByLeague(visible);
  app.innerHTML = `
    ${renderTopbar(total)}
    ${state.loading ? `<div class="loading"><div class="spinner"></div>Загрузка матчей…</div>` :
      groups.length === 0 ? renderEmpty() : groups.map(renderLeagueGroup).join("")}
    ${renderBottomNav("matches")}
    ${renderSheet()}
  `;
  bindMatchHandlers();
}

function renderTopbar(total) {
  return `
    <div class="topbar">
      <div class="topbar-row">
        <div class="live-status">
          <div class="live-dot"></div>
          <span class="live-label">LIVE</span>
        </div>
        <span class="live-count">· ${total} матчей</span>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="loadLive(true)" title="Обновить">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
          <button class="icon-btn accent" onclick="openSheet('filters')" title="Фильтры">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="chips-row">
        ${renderChip("all", "Все")}
        ${renderChip("1t", "1Т")}
        ${renderChip("2t", "2Т")}
        ${renderChip("00", "0:0")}
        ${renderChip("fav", "★ Избр", "amber")}
      </div>
    </div>
  `;
}

function renderChip(id, label, cls = "") {
  const active = state.preset === id ? " active" : "";
  return `<button class="chip ${cls}${active}" onclick="setPreset('${id}')">${label}</button>`;
}

function renderEmpty() {
  return `
    <div class="empty">
      <div class="empty-icon">⚽</div>
      <div>Нет матчей под этот фильтр</div>
      <div style="font-size: 10px; color: var(--text-faint); margin-top: 8px;">
        Попробуйте сбросить фильтры или подождать обновления.
      </div>
    </div>
  `;
}

function renderLeagueGroup(g) {
  return `
    <div>
      <div class="league-header">
        <div class="league-flag">${flagSvg(g.country_code)}</div>
        <div class="league-text">
          <div class="league-country">${esc(g.country)}</div>
          <div class="league-name">${esc(g.league)}</div>
        </div>
        <div class="league-count">${g.matches.length}</div>
      </div>
      ${g.matches.map(renderMatchRow).join("")}
    </div>
  `;
}

function renderMatchRow(m) {
  const fav = isFav(m.id);
  const minuteText = m.minute_text || (m.minute ? `${m.minute}'` : "LIVE");
  const minute = safeInt(m.minute, 0);
  const isHT = (m.period === "HT") || /HT|перерыв/i.test(minuteText);
  const sh = safeInt(m.score_home);
  const sa = safeInt(m.score_away);
  return `
    <div class="match-row" data-id="${esc(m.id)}">
      <div class="match-minute ${isHT ? "ht" : ""}">${esc(minuteText)}${minute > 45 ? `<small>2Т</small>` : (minute > 0 ? `<small>1Т</small>` : "")}</div>
      <div class="match-teams">
        <div class="match-team">${esc(m.home)}</div>
        <div class="match-team">${esc(m.away)}</div>
      </div>
      <div class="match-score">
        <div class="match-score-row ${sh > 0 ? "scored" : ""}">${sh}</div>
        <div class="match-score-row ${sa > 0 ? "scored" : ""}">${sa}</div>
      </div>
      <button class="star-btn ${fav ? "active" : ""}" data-fav="${esc(m.id)}" title="${fav ? "Убрать" : "В избранное"}">
        ${fav ? "★" : "☆"}
      </button>
    </div>
  `;
}

function bindMatchHandlers() {
  for (const el of document.querySelectorAll(".match-row")) {
    el.addEventListener("click", (e) => {
      if (e.target.closest("[data-fav]")) return;
      const id = el.dataset.id;
      loadDetail(id);
    });
  }
  for (const btn of document.querySelectorAll("[data-fav]")) {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFav(btn.dataset.fav);
      render();
    });
  }
}

// ----------------------------------------
//  Bottom nav
// ----------------------------------------
function renderBottomNav(active) {
  const tab = (id, icon, label) => {
    const isActive = active === id;
    const badge = id === "notify" && state.unreadAlerts > 0
      ? `<span style="position:absolute;top:6px;right:30%;background:var(--red);color:white;font-size:8px;font-weight:800;min-width:12px;height:12px;border-radius:8px;display:grid;place-items:center;padding:0 3px;">${state.unreadAlerts}</span>`
      : "";
    return `
      <button class="nav-tab ${isActive ? "active" : ""}" onclick="switchView('${id}')">
        <span class="nav-icon">${icon}</span>
        ${label}
        ${badge}
      </button>
    `;
  };
  return `
    <div class="bottom-nav">
      ${tab("matches", "⚽", "Матчи")}
      ${tab("favorites", "★", "Избранное")}
      ${tab("notify", "🔔", "Уведомления")}
    </div>
  `;
}

function switchView(v) {
  state.view = v;
  if (v === "notify") state.unreadAlerts = 0;
  render();
}

// ----------------------------------------
//  Favorites screen
// ----------------------------------------
function renderFavorites() {
  const fav = getFavs();
  const matches = flattenLive(state.live).filter(m => fav.has(String(m.id)));
  const groups = groupByLeague(matches);
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-row">
        <div class="live-status">
          <div class="live-dot"></div>
          <span class="live-label">ИЗБРАННОЕ</span>
        </div>
        <span class="live-count">· ${matches.length}</span>
      </div>
    </div>
    ${matches.length === 0 ? renderFavEmpty() : groups.map(renderLeagueGroup).join("")}
    ${renderBottomNav("favorites")}
  `;
  bindMatchHandlers();
}

function renderFavEmpty() {
  return `
    <div class="fav-empty">
      <div class="fav-empty-icon">☆</div>
      <div class="fav-empty-title">Пока нет избранных матчей</div>
      <div class="fav-empty-text">Откройте любой матч в списке и нажмите ★, чтобы добавить сюда. Здесь будут показаны только лайв-игры из избранного.</div>
    </div>
  `;
}

// ----------------------------------------
//  Notify (alerts) screen
// ----------------------------------------
function renderNotify() {
  const cfg = getNotifyFilter();
  const enabled = cfg.enabled;
  const alerts = state.inAppAlerts;
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-row">
        <div class="live-status">
          <div class="live-dot" style="background:${enabled ? "var(--green)" : "#4b5563"};box-shadow:none;animation:none;"></div>
          <span class="live-label" style="color:${enabled ? "var(--green)" : "var(--text-muted)"}">УВЕДОМЛЕНИЯ</span>
        </div>
        <span class="live-count">· ${enabled ? "включены" : "выключены"}</span>
        <div class="topbar-actions">
          <button class="icon-btn accent" onclick="openSheet('notify-edit')" title="Настроить фильтр">⚙</button>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="toggle-row">
        <div class="label">Слать уведомления когда матч подходит под фильтр</div>
        <div class="switch ${enabled ? "on" : ""}" onclick="toggleNotifyEnabled()"></div>
      </div>
    </div>

    ${tg?.initData ? "" : `
      <div class="notify-status warn">
        ⚠ Открой это приложение из бота, чтобы push-уведомления приходили в Telegram.
      </div>
    `}

    <div class="page-title">История</div>
    <div class="page-subtitle">${alerts.length} срабатываний за сессию</div>

    ${alerts.length === 0 ? `
      <div class="fav-empty">
        <div class="fav-empty-icon">🔔</div>
        <div class="fav-empty-title">Пока тихо</div>
        <div class="fav-empty-text">Когда матч начнёт подходить под твой фильтр, сюда придёт уведомление и в Telegram (если приложение открыто из бота).</div>
      </div>
    ` : `
      <div>
        ${alerts.map(renderAlert).join("")}
      </div>
    `}
    ${renderBottomNav("notify")}
  `;
}

function renderAlert(a) {
  const tm = new Date(a.ts);
  const hh = String(tm.getHours()).padStart(2, "0");
  const mm = String(tm.getMinutes()).padStart(2, "0");
  return `
    <div class="match-row" data-id="${esc(a.id)}">
      <div class="match-minute">🔔<small>${hh}:${mm}</small></div>
      <div class="match-teams">
        <div class="match-team">${esc(a.title)}</div>
        <div class="match-team" style="font-weight:500;color:var(--text-muted);font-size:11px;">${esc(a.subtitle)}</div>
      </div>
      <div></div>
      <div></div>
    </div>
  `;
}

function toggleNotifyEnabled() {
  const cfg = getNotifyFilter();
  cfg.enabled = !cfg.enabled;
  saveNotifyFilter(cfg);
  setNotifyEnabled(cfg.enabled);
  // Try to subscribe on server (so push goes to Telegram chat)
  if (cfg.enabled && tg?.initData) {
    fetch("/api/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ init_data: tg.initData, filter: cfg }),
    }).catch(() => {});
  }
  if (cfg.enabled) checkNotifyMatches();
  render();
}

// ----------------------------------------
//  Detail screen
// ----------------------------------------
function renderDetail() {
  if (!state.detail) {
    app.innerHTML = `
      <div class="detail-topbar">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div class="detail-breadcrumb">Загрузка…</div>
      </div>
      <div class="loading"><div class="spinner"></div>Грузим матч…</div>
    `;
    return;
  }
  const d = state.detail;
  const m = d.match || {};
  const s = d.stats || {};
  const avg = d.avg || {};
  const fav = isFav(m.id);

  app.innerHTML = `
    <div class="detail-topbar">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div class="detail-breadcrumb">${flagSvg(m.country_code)} ${esc(m.country)} · ${esc(m.league)}</div>
      <button class="star-btn ${fav ? "active" : ""}" onclick="toggleFavRender('${esc(m.id)}')">${fav ? "★" : "☆"}</button>
    </div>

    <div class="scoreboard">
      <div class="scoreboard-grid">
        <div class="scoreboard-team">
          <div class="team-badge">${esc(initials(m.home))}</div>
          <div class="team-name-big">${esc(m.home)}</div>
        </div>
        <div class="scoreboard-center">
          <div class="big-score">${safeInt(m.score_home)} : ${safeInt(m.score_away)}</div>
          <div class="live-pill">
            <div class="live-dot"></div>
            ${esc(m.minute_text || (m.minute ? `${m.minute}'` : "LIVE"))}
          </div>
        </div>
        <div class="scoreboard-team">
          <div class="team-badge">${esc(initials(m.away))}</div>
          <div class="team-name-big">${esc(m.away)}</div>
        </div>
      </div>
    </div>

    <div class="detail-tabs">
      <button class="tab-btn ${state.detailTab === "live" ? "active" : ""}" onclick="setDetailTab('live')">Лайв-стат</button>
      <button class="tab-btn ${state.detailTab === "stats" ? "active" : ""}" onclick="setDetailTab('stats')">Все цифры</button>
      <button class="tab-btn ${state.detailTab === "avg" ? "active" : ""}" onclick="setDetailTab('avg')">Среднее</button>
    </div>

    ${renderDetailTab(s, avg)}

    <div class="actions-row">
      ${m.link ? `<a class="action-btn primary" href="${esc(m.link)}" target="_blank" rel="noopener">↗ IGScore</a>` : ""}
      <button class="action-btn ${fav ? "active" : ""}" onclick="toggleFavRender('${esc(m.id)}')">
        ${fav ? "★ В избранном" : "☆ Добавить"}
      </button>
    </div>

    ${renderBottomNav("matches")}
  `;
}

function renderDetailTab(s, avg) {
  if (state.detailTab === "avg") return renderAvgTab(avg);
  if (state.detailTab === "stats") return renderAllStatsTab(s);
  return renderLiveStatsTab(s);
}

function statBar(home, away, label) {
  const h = safeInt(home);
  const a = safeInt(away);
  const total = h + a || 1;
  const hPct = (h / total) * 100;
  const aPct = (a / total) * 100;
  return `
    <div class="stat-bar">
      <div class="stat-bar-head">
        <span class="stat-bar-value home">${h}</span>
        <span class="stat-bar-label">${esc(label)}</span>
        <span class="stat-bar-value away">${a}</span>
      </div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill-h" style="width:${hPct}%"></div>
        <div class="stat-bar-fill-a" style="width:${aPct}%"></div>
      </div>
    </div>
  `;
}

function pctBar(home, away, label) {
  const h = clamp(safeInt(home, 50), 0, 100);
  const a = clamp(safeInt(away, 100 - h), 0, 100);
  return `
    <div class="stat-bar">
      <div class="stat-bar-head">
        <span class="stat-bar-value home">${h}%</span>
        <span class="stat-bar-label">${esc(label)}</span>
        <span class="stat-bar-value away">${a}%</span>
      </div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill-h" style="width:${h}%"></div>
        <div class="stat-bar-fill-a" style="width:${a}%"></div>
      </div>
    </div>
  `;
}

function renderLiveStatsTab(s) {
  if (!s || Object.keys(s).length === 0) {
    return `<div class="empty" style="padding:40px 20px;">Статистика пока не пришла. Подожди пару секунд и обнови.</div>`;
  }
  const poss = s.possession || { home: 50, away: 50 };
  const shots = s.shots || { home: 0, away: 0 };
  const ontarget = s.on_target || { home: 0, away: 0 };
  const dangerous = s.dangerous || { home: 0, away: 0 };
  const corners = s.corners || { home: 0, away: 0 };
  return `
    <div class="stat-section">
      <div class="stat-section-title">Лайв-статистика</div>
      ${pctBar(poss.home, poss.away, "Владение")}
      ${statBar(shots.home, shots.away, "Удары")}
      ${statBar(ontarget.home, ontarget.away, "В створ")}
      ${statBar(dangerous.home, dangerous.away, "Опасные")}
      ${statBar(corners.home, corners.away, "Угловые")}
    </div>
  `;
}

function renderAllStatsTab(s) {
  if (!s || Object.keys(s).length === 0) {
    return `<div class="empty" style="padding:40px 20px;">Данных нет.</div>`;
  }
  const m = state.detail?.match || {};
  const poss = s.possession || { home: 50, away: 50 };
  const shots = s.shots || { home: 0, away: 0 };
  const ontarget = s.on_target || { home: 0, away: 0 };
  const dangerous = s.dangerous || { home: 0, away: 0 };
  const corners = s.corners || { home: 0, away: 0 };
  const attacks = s.attacks || { home: 0, away: 0 };
  return `
    <div class="stat-section">
      <div class="stat-section-title">Команда хозяев</div>
      <div class="avg-card" style="margin-left:0;margin-right:0;">
        <div class="avg-row"><span class="avg-team">${esc(m.home)}</span><div class="avg-value"><strong>${safeInt(m.score_home)}</strong> голов</div></div>
        <div class="avg-row"><span class="avg-team">Владение</span><div class="avg-value"><strong>${safeInt(poss.home,50)}%</strong></div></div>
        <div class="avg-row"><span class="avg-team">Удары</span><div class="avg-value"><strong>${safeInt(shots.home)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">В створ</span><div class="avg-value"><strong>${safeInt(ontarget.home)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">Опасные атаки</span><div class="avg-value"><strong>${safeInt(dangerous.home)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">Угловые</span><div class="avg-value"><strong>${safeInt(corners.home)}</strong></div></div>
        ${attacks.home ? `<div class="avg-row"><span class="avg-team">Атаки</span><div class="avg-value"><strong>${safeInt(attacks.home)}</strong></div></div>` : ""}
      </div>
      <div class="stat-section-title">Команда гостей</div>
      <div class="avg-card" style="margin-left:0;margin-right:0;">
        <div class="avg-row"><span class="avg-team">${esc(m.away)}</span><div class="avg-value"><strong>${safeInt(m.score_away)}</strong> голов</div></div>
        <div class="avg-row"><span class="avg-team">Владение</span><div class="avg-value"><strong>${safeInt(poss.away,50)}%</strong></div></div>
        <div class="avg-row"><span class="avg-team">Удары</span><div class="avg-value"><strong>${safeInt(shots.away)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">В створ</span><div class="avg-value"><strong>${safeInt(ontarget.away)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">Опасные атаки</span><div class="avg-value"><strong>${safeInt(dangerous.away)}</strong></div></div>
        <div class="avg-row"><span class="avg-team">Угловые</span><div class="avg-value"><strong>${safeInt(corners.away)}</strong></div></div>
        ${attacks.away ? `<div class="avg-row"><span class="avg-team">Атаки</span><div class="avg-value"><strong>${safeInt(attacks.away)}</strong></div></div>` : ""}
      </div>
    </div>
  `;
}

function renderAvgTab(avg) {
  const m = state.detail?.match || {};
  const h = avg.home || {};
  const a = avg.away || {};
  if (!h.avg && !a.avg) {
    return `<div class="empty" style="padding:40px 20px;">Нет данных по последним 10 матчам.</div>`;
  }
  return `
    <div class="stat-section">
      <div class="stat-section-title">Средний тотал · 10 матчей</div>
      <div class="avg-card" style="margin-left:0;margin-right:0;">
        <div class="avg-row">
          <span class="avg-team">${esc(m.home)}</span>
          <div class="avg-value">
            <strong>${h.avg ?? "—"}</strong>
            <span class="avg-zero">0:0 — ${safeInt(h.zero_zero)}/${safeInt(h.count, 10)}</span>
          </div>
        </div>
        <div class="avg-row">
          <span class="avg-team">${esc(m.away)}</span>
          <div class="avg-value">
            <strong>${a.avg ?? "—"}</strong>
            <span class="avg-zero">0:0 — ${safeInt(a.zero_zero)}/${safeInt(a.count, 10)}</span>
          </div>
        </div>
        ${h.avg && a.avg ? `
          <div class="avg-row" style="background:var(--green-bg);margin:8px -14px -12px;padding:8px 14px;border-radius:0 0 var(--radius) var(--radius);">
            <span class="avg-team" style="color:var(--green);font-weight:800;">📌 Ориентир</span>
            <div class="avg-value"><strong>${((h.avg + a.avg) / 2).toFixed(2)}</strong></div>
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

function setDetailTab(t) { state.detailTab = t; render(); }
function toggleFavRender(id) { toggleFav(id); render(); }
function goBack() {
  state.view = "matches";
  state.selectedMatch = null;
  state.detail = null;
  render();
}

// ----------------------------------------
//  Sheets (bottom slide-up modals)
// ----------------------------------------
function renderSheet() {
  if (!state.sheet) return "";
  if (state.sheet === "filters") return renderFiltersSheet();
  if (state.sheet === "notify-edit") return renderNotifyEditSheet();
  return "";
}

function openSheet(kind) {
  state.sheet = kind;
  render();
  // animate in next tick
  requestAnimationFrame(() => {
    document.querySelector(".sheet-overlay")?.classList.add("open");
    document.querySelector(".sheet")?.classList.add("open");
  });
}

function closeSheet(rerender = true) {
  document.querySelector(".sheet-overlay")?.classList.remove("open");
  document.querySelector(".sheet")?.classList.remove("open");
  setTimeout(() => {
    state.sheet = null;
    if (rerender) render();
  }, 240);
}

function renderFiltersSheet() {
  const f = state.filters;
  return `
    <div class="sheet-overlay" onclick="closeSheet()"></div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Фильтры</div>
        <button class="sheet-reset" onclick="resetFilters()">Сброс</button>
      </div>
      <div class="sheet-body">
        <div class="filter-group">
          <div class="filter-group-title">Минута матча</div>
          <div class="filter-input-row">
            <input type="number" class="filter-input" id="f-min-from" min="0" max="130" value="${f.minute_min}" placeholder="от" />
            <span class="filter-sep">—</span>
            <input type="number" class="filter-input" id="f-min-to" min="0" max="130" value="${f.minute_max}" placeholder="до" />
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Удары (общее)</div>
          <input type="number" class="filter-input-wide" id="f-shots" min="0" value="${f.shots_min}" placeholder="минимум суммарно" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">В створ (общее)</div>
          <input type="number" class="filter-input-wide" id="f-on-target" min="0" value="${f.on_target_min}" placeholder="минимум суммарно" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Опасные атаки (общее)</div>
          <input type="number" class="filter-input-wide" id="f-dangerous" min="0" value="${f.dangerous_min}" placeholder="минимум суммарно" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Атаки (общее)</div>
          <input type="number" class="filter-input-wide" id="f-attacks" min="0" value="${f.attacks_min}" placeholder="минимум суммарно" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Угловые (общее)</div>
          <input type="number" class="filter-input-wide" id="f-corners" min="0" value="${f.corners_min}" placeholder="минимум суммарно" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Владение (макс. одной команды)</div>
          <input type="number" class="filter-input-wide" id="f-possession" min="0" max="100" value="${f.possession_min}" placeholder="мин. %" />
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Счёт (через запятую)</div>
          <input type="text" class="filter-input-wide" id="f-scores" value="${esc(f.scores)}" placeholder="например 0-0,1-0,0-1" />
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn secondary" onclick="closeSheet()">Отмена</button>
        <button class="btn primary" onclick="applyFilters()">Применить</button>
      </div>
    </div>
  `;
}

function applyFilters() {
  state.filters = readFilterInputs();
  state.preset = "all";
  closeSheet();
}

function resetFilters() {
  for (const k of Object.keys(state.filters)) state.filters[k] = (k === "scores" ? "" : (k === "minute_min" ? 1 : k === "minute_max" ? 130 : 0));
  state.preset = "all";
  closeSheet();
}

function readFilterInputs() {
  const get = (id, def = 0) => safeInt(document.getElementById(id)?.value, def);
  return {
    minute_min: clamp(get("f-min-from", 1), 0, 130),
    minute_max: clamp(get("f-min-to", 130), 0, 130),
    shots_min: get("f-shots", 0),
    on_target_min: get("f-on-target", 0),
    dangerous_min: get("f-dangerous", 0),
    attacks_min: get("f-attacks", 0),
    corners_min: get("f-corners", 0),
    possession_min: clamp(get("f-possession", 0), 0, 100),
    scores: (document.getElementById("f-scores")?.value || "").trim(),
  };
}

function renderNotifyEditSheet() {
  const cfg = getNotifyFilter();
  return `
    <div class="sheet-overlay" onclick="closeSheet()"></div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Фильтр уведомлений</div>
        <button class="sheet-reset" onclick="resetNotifyFilter()">Сброс</button>
      </div>
      <div class="sheet-body">
        <div class="filter-group">
          <div class="filter-group-title">Минута матча</div>
          <div class="filter-input-row">
            <input type="number" class="filter-input" id="n-min-from" min="0" max="130" value="${cfg.minute_min}" />
            <span class="filter-sep">—</span>
            <input type="number" class="filter-input" id="n-min-to" min="0" max="130" value="${cfg.minute_max}" />
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Удары — суммарно от</div>
          <input type="number" class="filter-input-wide" id="n-shots" min="0" value="${cfg.shots_min}" />
        </div>
        <div class="filter-group">
          <div class="filter-group-title">В створ — суммарно от</div>
          <input type="number" class="filter-input-wide" id="n-on-target" min="0" value="${cfg.on_target_min}" />
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Опасные атаки — суммарно от</div>
          <input type="number" class="filter-input-wide" id="n-dangerous" min="0" value="${cfg.dangerous_min}" />
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Атаки — суммарно от</div>
          <input type="number" class="filter-input-wide" id="n-attacks" min="0" value="${cfg.attacks_min}" />
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Угловые — суммарно от</div>
          <input type="number" class="filter-input-wide" id="n-corners" min="0" value="${cfg.corners_min}" />
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Только счёт (запятыми)</div>
          <input type="text" class="filter-input-wide" id="n-scores" value="${esc((cfg.scores || []).join(','))}" placeholder="0-0,1-0,0-1" />
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn secondary" onclick="closeSheet()">Отмена</button>
        <button class="btn primary" onclick="applyNotifyFilter()">Сохранить</button>
      </div>
    </div>
  `;
}

function applyNotifyFilter() {
  const cfg = getNotifyFilter();
  const get = (id, def = 0) => safeInt(document.getElementById(id)?.value, def);
  cfg.minute_min = clamp(get("n-min-from", 1), 0, 130);
  cfg.minute_max = clamp(get("n-min-to", 130), 0, 130);
  cfg.shots_min = get("n-shots", 0);
  cfg.on_target_min = get("n-on-target", 0);
  cfg.dangerous_min = get("n-dangerous", 0);
  cfg.attacks_min = get("n-attacks", 0);
  cfg.corners_min = get("n-corners", 0);
  const scoresRaw = (document.getElementById("n-scores")?.value || "").trim();
  cfg.scores = scoresRaw ? scoresRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
  saveNotifyFilter(cfg);
  // Re-subscribe on server if enabled
  if (cfg.enabled && tg?.initData) {
    fetch("/api/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ init_data: tg.initData, filter: cfg }),
    }).catch(() => {});
  }
  closeSheet();
}

function resetNotifyFilter() {
  const def = defaultNotifyFilter();
  def.enabled = getNotifyFilter().enabled;
  saveNotifyFilter(def);
  closeSheet();
}

// ----------------------------------------
//  Preset chip click
// ----------------------------------------
function setPreset(p) { state.preset = p; render(); }

// ============================================================
//  Auto-refresh + boot
// ============================================================
loadLive(false);
setInterval(() => {
  if (state.view !== "detail" && !state.sheet) loadLive(false);
}, 15000);

// Expose handlers used inline
window.loadLive = loadLive;
window.openSheet = openSheet;
window.closeSheet = closeSheet;
window.applyFilters = applyFilters;
window.resetFilters = resetFilters;
window.applyNotifyFilter = applyNotifyFilter;
window.resetNotifyFilter = resetNotifyFilter;
window.setPreset = setPreset;
window.setDetailTab = setDetailTab;
window.toggleFavRender = toggleFavRender;
window.goBack = goBack;
window.switchView = switchView;
window.toggleNotifyEnabled = toggleNotifyEnabled;
window.loadDetail = loadDetail;
</script>
</body>
</html>
