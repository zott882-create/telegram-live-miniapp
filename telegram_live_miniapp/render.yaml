services:
  - type: web
    name: telegram-live-miniapp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: HOST
        value: 0.0.0.0
      - key: COLLECTOR_ENABLED
        value: "1"
      - key: LIVE_FROM_DB_ONLY
        value: "1"
